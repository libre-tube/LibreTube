name: CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "README*.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
  push:
    paths-ignore:
      - "README*.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ktlint is intentionally not enforced yet because the repository has existing formatting violations.
      # A follow-up PR should add a ktlint baseline or first reformat the codebase.
      #- name: Run ktlint
      #  run: |
      #    curl -sSLo ktlint https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
      #    chmod +x ktlint
      #    ./ktlint "**/*.kt" "**/*.kts"

      - name: Run Android lint
        run: ./gradlew :app:lintDebug --no-daemon

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**
          if-no-files-found: ignore

  dependency-review:
    name: Dependency vulnerability review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  debug-builds:
    name: Debug build
    runs-on: ubuntu-latest
    needs:
      - quality-gates
      - dependency-review
    if: always() && needs.quality-gates.result == 'success' && (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          architecture: 'x64'

      - name: Retrieve Commit Info
        run: |
          cd .github
          curl https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }} > commit.json
          cd ..

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Git Configuration
        run: |
          git config --global user.name "libretube-bot"
          git config --global user.email "libretube@proton.me"
          git config --global credential.helper store
          echo "https://libretube-bot:${{ secrets.GH_TOKEN }}@github.com" > ~/.git-credentials

      - name: Compile
        run: ./gradlew assembleDebug --no-daemon

      - name: Sign APK
        continue-on-error: true
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/debug
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: 36.0.0

      - name: Upload to Archive
        continue-on-error: true
        run: |
          mv .github/uploader.py .
          echo "GH_REPO = '${{ github.repository }}'" > config_file.py
          git clone --filter=blob:none https://github.com/libre-tube/NightlyBuilds nightly
          rm -rf nightly/*.apk
          mv app/build/outputs/apk/debug/*.apk nightly/
          cd nightly
          python ../uploader.py

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app
          path: nightly/*.apk
